<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram - Login</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="shortcut icon" href="img/insta-favico.jpg" type="image/x-icon">
</head>

<body>
    <main>
        <div class="main-container">
            <div class="image-container">
                <img src="img/banner-login.png" alt="Tela de uso do Instagram">
            </div>
            <div class="form-container">
                <div class="form-box">
                    <img src="img/instagram-mainlogo.jpg" alt="Instagram" class="logo-insta">
                    <form class="login-form">
                        <input type="text" name="username" id="username"
                            placeholder="Número de telefone, usuário ou email">
                        <input type="password" name="senha" id="senha" placeholder="Senha">
                        <input type="submit" value="Entrar">
                    </form>
                    <div class="separator">
                        <div class="line"></div>
                        <span>OU</span>
                    </div>
                    <div class="alternativo">
                        <div class="facebook-login">
                            <a href="#">
                                <img src="img/logo-facebook.jpg" alt="">
                                <span> Entrar com Facebook</span>
                            </a>
                        </div>
                        <div class="forgot-pass">
                            <a href="#">Esqueceu a senha?</a>
                        </div>
                    </div>
                </div>
                <div class="signup-container">
                    <p>Não tem uma conta?
                        <a href="#">Cadastre-se</a>
                    </p>
                </div>
                <div class="app-container">
                    <p>Obtenha o aplicativo</p>
                    <a href="#">
                        <img src="img/applestore.jpg" alt="Apple Store">
                    </a>
                    <a href="#">
                        <img src="img/playstore.jpg" alt="Playstore">
                    </a>
                </div>
            </div>
        </div>
    </main>
    <footer>
        <nav>
            <ul class="footer-links">
                <li><a href="#"></a>Meta</li>
                <li><a href="#"></a>Sobre</li>
                <li><a href="#"></a>Blog</li>
                <li><a href="#"></a>Ajuda</li>
                <li><a href="#"></a>API</li>
                <li><a href="#"></a>Privacidade</li>
                <li><a href="#"></a>Termos</li>
                <li><a href="#"></a>Principais Contas</li>
                <li><a href="#"></a>Hashtags</li>
                <li><a href="#"></a>Localização</li>
                <li><a href="#"></a>Instagram Lite</li>
            </ul>
        </nav>
        <p class="copyright">&copy; Instagram 2026 from Meta</p>
    </footer>
</body>

</html>
